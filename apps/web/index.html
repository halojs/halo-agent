<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      (function () {
        const html = document.documentElement;
        const local = localStorage.getItem("halo:theme")
          ? JSON.parse(localStorage.getItem("halo:theme"))
          : {};

        if (local.colorMode && local.colorMode !== "system") {
          html.classList.add(local.colorMode);
          html.style.setProperty("color-scheme", local.colorMode);
        } else {
          const systemColorMode = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
          html.classList.add(systemColorMode);
          html.style.setProperty("color-scheme", systemColorMode);
        }

        if (local.primaryColor) html.style.setProperty("--custom-primary", local.primaryColor);
        if (local.radius) html.style.setProperty("--custom-radius", local.radius);
      })();
    </script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }
      #splash {
        display: flex;
        min-height: 100%;
        align-items: center;
        justify-content: center;
        background: inherit;
      }
      #splash-card {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 96px;
        height: 96px;
      }
      #splash-logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
      }
    </style>
    <title>Halo (Alpha)</title>
  </head>
  <body>
    <div id="root">
      <div id="splash">
        <div id="splash-card" aria-label="Halo splash screen">
          <img id="splash-logo" src="/apple-touch-icon.png" alt="Halo" />
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
